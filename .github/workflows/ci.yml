name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install uv
      run: pip install uv
    - name: Install dependencies and browsers
      run: |
        uv sync
        playwright install --with-deps
    - name: Run Playwright tests
      run: uv run pytest
